<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif,system-ui,sans-serif"><title id="t">L_W (OOTF γ) — diversity curve</title><desc id="d">Diversity vs OOTF gamma for the L_W knob; coherent band shaded, walls at gamma below 0 and above ~2.4, interior diversity peak near gamma 1.</desc><text x="400" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="var(--text-primary,#1f2937)">L_W across 3 models — a coherence-robust curvature knob; diversity response differs</text><text x="400" y="46" text-anchor="middle" font-size="11.5" fill="var(--text-secondary,#6b7280)">x = OOTF γ (= 1.2 + 0.42·log₁₀(L_W/1000)) · y = diversity (1−self-BLEU) · 3 models · coherent across ~5 decades, walls only at the extremes</text><rect x="165.78947368421052" y="70" width="466.66666666666663" height="326" fill="var(--positive,#16a34a)" fill-opacity="0.06"/><text x="399.12280701754383" y="84" text-anchor="middle" font-size="10.5" fill="var(--positive,#16a34a)" font-weight="600">coherent band  (L_W 3 … 100k+)</text><line x1="131.4035087719298" y1="70" x2="131.4035087719298" y2="396" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.7"/><text x="127.40350877192981" y="390" text-anchor="end" font-size="10" fill="#b91c1c">γ&lt;0 inverts → wall (all)</text><line x1="720.8771929824561" y1="70" x2="720.8771929824561" y2="396" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.7"/><text x="715.8771929824561" y="98" text-anchor="end" font-size="10" fill="#b91c1c">over-sharpen wall (Gemmas only)</text><line x1="70" y1="375.625" x2="770" y2="375.625" stroke="var(--border,#e5e7eb)" stroke-opacity="0.6"/><text x="62" y="379.625" text-anchor="end" font-size="10" fill="var(--text-tertiary,#9ca3af)">0.50</text><line x1="70" y1="324.6875" x2="770" y2="324.6875" stroke="var(--border,#e5e7eb)" stroke-opacity="0.6"/><text x="62" y="328.6875" text-anchor="end" font-size="10" fill