<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HLG Sampling Explorer — real logits</title>
<style>
:root{--text:#1f2937;--text2:#475569;--text3:#94a3b8;--bg:#f7f9fc;--card:#fff;--bd:#e2e8f0;
  --accent:#2563eb;--accent2:#0891b2;--pos:#16a34a;--warn:#d97706;--danger:#dc2626;--grid:#eef2f7;--gray:#94a3b8;}
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden}
body{background:var(--bg);color:var(--text);font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.app{height:100vh;display:grid;grid-template-columns:minmax(380px,42%) 1fr;gap:14px;padding:14px}
.panel{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 10px 30px -24px rgba(15,23,42,.2);min-height:0;overflow:auto}
.controls{display:flex;flex-direction:column}
h1{font-size:15px;margin:0;letter-spacing:-.01em}
.topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px}
.presets{display:flex;flex-wrap:wrap;gap:5px;margin-left:auto}
.presets button{font:600 11px/1 inherit;padding:6px 9px;border:1px solid var(--bd);background:var(--card);border-radius:7px;cursor:pointer;color:var(--text2)}
.presets button:hover{border-color:var(--accent);color:var(--accent)}
.presets button.reset{color:var(--danger);border-color:#f3d6d6}
.presets button.copy{background:var(--accent);color:#fff;border-color:var(--accent)}
.distsel{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.distsel button{font:600 11px/1 inherit;padding:6px 9px;border:1px solid var(--bd);background:var(--grid);border-radius:7px;cursor:pointer;color:var(--text2)}
.distsel button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.copyrow{display:flex;gap:6px;align-items:center;margin-bottom:9px}
.copyrow input{flex:1;font:11px/1.3 ui-monospace,SFMono-Regular,Menlo,monospace;border:1px solid var(--bd);border-radius:7px;padding:6px 8px;background:var(--grid);color:#0f172a}
.copyrow .ok{font-size:11px;font-weight:700;color:var(--pos);min-width:46px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;align-content:start}
.gh{grid-column:1/-1;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin:6px 0 0;border-top:1px solid var(--bd);padding-top:7px}
.gh:first-child{border-top:none;padding-top:0;margin-top:0}
.cell label{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;font-weight:600;gap:6px}
.cell label .v{font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;font-size:12px}
.cell input[type=range]{width:100%;accent-color:var(--accent);height:16px;cursor:pointer;margin:1px 0 0}
.figs{display:flex;flex-direction:column;gap:8px}
.figs .panel{padding:8px 12px}
.fh{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);font-weight:700;margin:0 0 2px}
.fh small{font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)}
svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:13px;flex-wrap:wrap;font-size:10.5px;color:var(--text2);margin-top:3px}
.legend span{display:inline-flex;align-items:center;gap:5px}.legend i{width:14px;height:3px;border-radius:2px;display:inline-block}
.readouts{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px}
.ro{background:var(--grid);border-radius:7px;padding:5px 8px}
.ro .k{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3)}
.ro .val{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
@media(max-width:820px){.app{grid-template-columns:1fr;height:auto;overflow:auto}html,body{overflow:auto}}
</style></head>
<body>
<div class="app">
  <div class="panel controls">
    <div class="topbar"><h1>HLG Explorer · real logits</h1>
      <div class="presets">
        <button data-preset="base">Base</button><button data-preset="loose">Loose-A</button>
        <button data-preset="sharp">Sharp</button><button data-preset="base" class="reset">Reset</button>
        <button id="copyBtn" class="copy">Copy Values</button>
      </div>
    </div>
    <div class="distsel" id="distsel"></div>
    <div class="copyrow"><input id="cfgField" readonly spellcheck="false"><span class="ok" id="copyOk"></span></div>
    <div class="grid2" id="grid"></div>
  </div>
  <div class="figs">
    <div class="panel">
      <div class="fh">Transfer curve <small>· real tokens mapped on by their logits — watch them pile into the toe</small></div>
      <div id="curve"></div>
      <div class="legend"><span><i style="background:var(--accent)"></i>OETF</span><span><i style="background:var(--accent2)"></i>after γ</span><span><i style="background:var(--text3)"></i>temp (linear)</span><span><i style="background:var(--warn);height:8px;width:8px;border-radius:50%"></i>tokens</span></div>
      <div class="readouts" id="readouts"></div>
    </div>
    <div class="panel">
      <div class="fh">Distribution over the full 262k vocab <small>· x = rank (log) · y = probability (log)</small></div>
      <div id="dist"></div>
      <div class="legend"><span><i style="background:var(--gray)"></i>raw softmax</span><span><i style="background:var(--pos)"></i>default recipe (top-p·top-k)</span><span><i style="background:var(--accent)"></i>HLG</span><span><i style="background:var(--warn);height:9px;width:2px"></i>W reaches here</span></div>
      <div class="readouts" id="distro"></div>
    </div>
  </div>
</div>

<script src="hlg-figs/hlg-logits.js"></script>
<script>
const DISTS = (window.REAL_LOGITS||[]).map(d=>({...d, sorted:Float64Array.from(d.sorted)}));
let di = DISTS.length? DISTS.findIndex(d=>d.tag==="creative") : -1; if(di<0) di=0;

const DEF = { window:8, A:0.35, sM:0.7, targetGap:15, refGap:4, lw:1200, xM:0.55, yM:0.5, xFloor:0.2, yFloor:0.18, p:2.0, T:1.0, topP:0.95, topK:64 };
const PRESETS = { base:{...DEF}, loose:{...DEF,A:0.01}, sharp:{...DEF,targetGap:40,sM:2.0,A:0.2} };
const P = {...DEF};

const GROUPS = [
  {h:"HLG — primary", items:[
    {k:"window",label:"W — window (nats)",min:1,max:40,step:0.5},
    {k:"A",label:"A — shoulder",min:0.01,max:5,step:0.01},
    {k:"sM",label:"s_m — mid slope",min:0.05,max:6,step:0.05},
    {k:"targetGap",label:"target_gap",min:4,max:50,step:1},
    {k:"lw",label:"L_W (γ)",min:0,max:6,step:0.02,log:true},
    {k:"refGap",label:"refGap",min:1,max:20,step:0.5},
  ]},
  {h:"HLG — geometry", items:[
    {k:"xM",label:"x_M",min:0.3,max:0.8,step:0.01},{k:"yM",label:"y_M",min:0.3,max:0.7,step:0.01},
    {k:"xFloor",label:"x_floor",min:0.05,max:0.45,step:0.01},{k:"yFloor",label:"y_floor",min:0.05,max:0.45,step:0.01},
    {k:"p",label:"p — mid power",min:1.2,max:4,step:0.05},
  ]},
  {h:"Default recipe (the standard sampler)", items:[
    {k:"T",label:"temperature",min:0.1,max:2,step:0.05},{k:"topP",label:"top-p",min:0.1,max:1,step:0.01},{k:"topK",label:"top-k",min:1,max:512,step:1},
  ]},
];
const ALL = GROUPS.flatMap(g=>g.items);
const lwToS=lw=>Math.log10(lw), sToLw=s=>Math.pow(10,s);

function buildGrid(){
  const c=document.getElementById("grid"); c.innerHTML="";
  for(const g of GROUPS){ const h=document.createElement("div"); h.className="gh"; h.textContent=g.h; c.appendChild(h);
    for(const s of g.items){ const d=document.createElement("div"); d.className="cell";
      d.innerHTML=`<label>${s.label}<span class="v" id="v_${s.k}"></span></label><input type="range" id="s_${s.k}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.log?lwToS(P[s.k]):P[s.k]}">`;
      c.appendChild(d);
      d.querySelector("input").addEventListener("input",e=>{P[s.k]=s.log?sToLw(parseFloat(e.target.value)):parseFloat(e.target.value); render();});
    }
  }
}
function buildDistSel(){
  const c=document.getElementById("distsel"); c.innerHTML="";
  if(!DISTS.length){ c.innerHTML='<span style="color:var(--danger);font-size:11px">hlg-logits.js not loaded — run scripts/hlg-capture-logits.ts</span>'; return; }
  DISTS.forEach((d,i)=>{ const b=document.createElement("button"); b.textContent=`${d.tag} · ${d.entropyBits}b`; if(i===di)b.className="on";
    b.addEventListener("click",()=>{di=i; buildDistSel(); prep(); render();}); c.appendChild(b); });
}

// ---- shaper ----
function geom(){
  const {xM,yM,xFloor,yFloor,p,sM,A,lw,window:W,targetGap,refGap}=P;
  const dxf=xM-xFloor, kc=(yM-sM*dxf-yFloor)/Math.pow(dxf,p), sFloor=sM+kc*p*Math.pow(dxf,p-1);
  const det=-Math.pow(xFloor,4), ec=(yFloor*2*xFloor-xFloor*xFloor*sFloor)/det, fc=(Math.pow(xFloor,3)*sFloor-yFloor*3*xFloor*xFloor)/det;
  const yPeak=yM+A*Math.log(1+(sM/A)*(1-xM)), gamma=1.2+0.42*Math.log10(Math.max(lw,1e-3)/1000);
  const oetfS=x=>{let y; if(x>=xM)y=yM+A*Math.log(Math.max(1+(sM/A)*(x-xM),1e-9)); else if(x>=xFloor)y=yM-sM*(xM-x)-kc*Math.pow(Math.max(xM-x,0),p); else y=ec*x*x*x+fc*x*x; return Math.max(y,0);};
  const shapeS=x=>Math.pow(Math.max(oetfS(x)/yPeak,1e-9),gamma);
  const xRef=Math.max(0,Math.min(1,1-refGap/W)), outScale=targetGap/Math.max(1e-6,1-shapeS(xRef));
  return {gamma,yPeak,outScale,xRef,oetfS,shapeS};
}

// ---- per-distribution prep ----
let D=null;
function logsumexp(arr,n){ let m=-1e30; for(let i=0;i<n;i++) if(arr[i]>m)m=arr[i]; let s=0; for(let i=0;i<n;i++) s+=Math.exp(arr[i]-m); return m+Math.log(s); }
function prep(){
  if(!DISTS.length){ D=null; return; }
  const d=DISTS[di], s=d.sorted, V=s.length, lmax=s[0];
  const rawLse=logsumexp(s,V);
  // log-spaced sample ranks for rendering (+ dense head)
  const ranks=new Set(); for(let i=0;i<64;i++) ranks.add(i);
  const N=360, lV=Math.log10(V); for(let i=0;i<=N;i++) ranks.add(Math.min(V-1,Math.round(Math.pow(10,(i/N)*lV))-0+0));
  const sr=[...ranks].filter(r=>r<V).sort((a,b)=>a-b);
  D={s,V,lmax,rawLse,sr,tag:d.tag,ent:d.entropyBits};
}

// ---- distribution computations ----
function probsAt(g){
  const {s,V,lmax,rawLse,sr}=D, {shapeS,outScale}=g, W=P.window;
  // raw
  const raw=sr.map(r=>Math.exp(s[r]-rawLse));
  // HLG: only tokens within W of top leave the toe; rest are the constant toe value
  let inWin=0; const thr=lmax-W; while(inWin<V && s[inWin]>thr) inWin++;
  const toeShaped=outScale*shapeS(0);
  const shapedOf=r=>{ if(r>=inWin) return toeShaped; const x=Math.max(0,Math.min(1,(s[r]-lmax)/W+1)); return outScale*shapeS(x); };
  let mx=toeShaped; for(let i=0;i<inWin;i++){ const v=shapedOf(i); if(v>mx)mx=v; }
  let Z=(V-inWin)*Math.exp(toeShaped-mx); for(let i=0;i<inWin;i++) Z+=Math.exp(shapedOf(i)-mx);
  const hlgLse=mx+Math.log(Z);
  const hlg=sr.map(r=>Math.exp(shapedOf(r)-hlgLse));
  // default recipe: temp → full softmax → keep top-p ∩ top-k → renormalize
  const T=P.T; const scaled=new Float64Array(V); for(let i=0;i<V;i++) scaled[i]=s[i]/T;
  const sLse=T===1?(rawLse):logsumexp(scaled,V);
  let cum=0, mset=V; for(let i=0;i<V;i++){ cum+=Math.exp(scaled[i]-sLse); if(cum>=P.topP){ mset=i+1; break; } }
  const keep=Math.max(1,Math.min(Math.round(P.topK),mset));
  let dZ=logsumexp(scaled.subarray(0,keep),keep);
  const def=sr.map(r=>r<keep?Math.exp(scaled[r]-dZ):0);
  return {raw,hlg,def,inWin,keep,hlgTop1:Math.exp(shapedOf(0)-hlgLse)};
}

// ---- curve panel ----
const CW=560,CH=210,ML=42,MR=14,MT=15,MB=30;
const cx=x=>ML+x*(CW-ML-MR), cy=(y,ym)=>MT+(1-y/ym)*(CH-MT-MB);
const poly=(fn,ym,n=140)=>{let d="";for(let i=0;i<=n;i++){const x=i/n;d+=(i?"L":"M")+cx(x).toFixed(1)+" "+cy(fn(x),ym).toFixed(1)+" ";}return d;};
function drawCurve(g){
  const {oetfS,yPeak,shapeS}=g, oetfN=x=>Math.max(0,oetfS(x)/yPeak);
  let ym=1; for(let i=0;i<=140;i++){const x=i/140; ym=Math.max(ym,oetfN(x),shapeS(x));} ym=Math.min(ym,8);
  let s=`<svg viewBox="0 0 ${CW} ${CH}" font-family="inherit">`;
  s+=`<rect x="${cx(0)}" y="${MT}" width="${cx(P.xFloor)-cx(0)}" height="${CH-MT-MB}" fill="#fde2e2" opacity=".5"/><rect x="${cx(P.xFloor)}" y="${MT}" width="${cx(P.xM)-cx(P.xFloor)}" height="${CH-MT-MB}" fill="#fff3d6" opacity=".5"/><rect x="${cx(P.xM)}" y="${MT}" width="${cx(1)-cx(P.xM)}" height="${CH-MT-MB}" fill="#dcfce7" opacity=".5"/>`;
  s+=`<text x="${(cx(0)+cx(P.xFloor))/2}" y="${MT+11}" text-anchor="middle" font-size="9" fill="#b91c1c">toe</text><text x="${(cx(P.xFloor)+cx(P.xM))/2}" y="${MT+11}" text-anchor="middle" font-size="9" fill="#92400e">mid</text><text x="${(cx(P.xM)+cx(1))/2}" y="${MT+11}" text-anchor="middle" font-size="9" fill="#166534">shoulder</text>`;
  for(let f=0;f<=1.0001;f+=0.25){const yv=f*ym; s+=`<line x1="${ML}" y1="${cy(yv,ym)}" x2="${CW-MR}" y2="${cy(yv,ym)}" stroke="var(--grid)"/>`;}
  s+=`<line x1="${cx(0)}" y1="${cy(0,ym)}" x2="${cx(1)}" y2="${cy(1,ym)}" stroke="var(--text3)" stroke-width="1.3" stroke-dasharray="5 4"/>`;
  for(const xv of [P.xFloor,P.xM]) s+=`<line x1="${cx(xv)}" y1="${MT}" x2="${cx(xv)}" y2="${CH-MB}" stroke="var(--text3)" stroke-dasharray="2 3" opacity=".6"/>`;
  s+=`<path d="${poly(oetfN,ym)}" fill="none" stroke="var(--accent)" stroke-width="2.2"/><path d="${poly(shapeS,ym)}" fill="none" stroke="var(--accent2)" stroke-width="2.2"/>`;
  // real tokens: top 80 mapped on by logit
  if(D){ const n=Math.min(80,D.V); for(let r=0;r<n;r++){ const x=Math.max(0,Math.min(1,(D.s[r]-D.lmax)/P.window+1)); s+=`<circle cx="${cx(x)}" cy="${cy(shapeS(x),ym)}" r="${r===0?3.4:2.4}" fill="var(--warn)" stroke="#fff" stroke-width="0.8" opacity="${r===0?1:0.7}"/>`; } }
  s+=`<text x="${(ML+CW-MR)/2}" y="${CH-3}" text-anchor="middle" font-size="9.5" fill="var(--text2)">signal x  (1 = top token · 0 = ≥W nats below)</text>`;
  if(g.gamma<0) s+=`<text x="${(ML+CW-MR)/2}" y="${MT+28}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--danger)">γ&lt;0 — ranking inverts (incoherent)</text>`;
  s+=`</svg>`; document.getElementById("curve").innerHTML=s;
}

// ---- distribution panel (log rank × log prob) ----
const DW=560,DH=210,DL=44,DR=12,DT=12,DB=30, PLO=-7;
function dx(r){ return DL+(Math.log10(r+1)/Math.log10(D.V))*(DW-DL-DR); }
function dy(p){ const lp=p>0?Math.log10(p):PLO; return DT+(1-(Math.max(lp,PLO)-PLO)/(0-PLO))*(DH-DT-DB); }
function linePath(arr){ let d="",started=false; for(let i=0;i<D.sr.length;i++){ const r=D.sr[i],p=arr[i]; if(p<=0){started=false;continue;} d+=(started?"L":"M")+dx(r).toFixed(1)+" "+dy(p).toFixed(1)+" "; started=true; } return d; }
function drawDist(pr){
  if(!D){ document.getElementById("dist").innerHTML='<div style="padding:30px;text-align:center;color:var(--text3)">no real logits loaded</div>'; document.getElementById("distro").innerHTML=""; return; }
  let s=`<svg viewBox="0 0 ${DW} ${DH}" font-family="inherit">`;
  for(let e=0;e>=PLO;e--){ const yy=dy(Math.pow(10,e)); s+=`<line x1="${DL}" y1="${yy}" x2="${DW-DR}" y2="${yy}" stroke="var(--grid)"/><text x="${DL-5}" y="${yy+3}" text-anchor="end" font-size="8" fill="var(--text3)">1e${e}</text>`; }
  for(let e=0;Math.pow(10,e)<D.V;e++){ const xx=dx(Math.pow(10,e)); s+=`<line x1="${xx}" y1="${DT}" x2="${xx}" y2="${DH-DB}" stroke="var(--grid)"/><text x="${xx}" y="${DH-DB+12}" text-anchor="middle" font-size="8" fill="var(--text3)">${e===0?"1":"1e"+e}</text>`; }
  s+=`<text x="${(DL+DW-DR)/2}" y="${DH-2}" text-anchor="middle" font-size="9" fill="var(--text2)">token rank (sorted by logit) →</text>`;
  // W reach marker
  let inWin=pr.inWin; s+=`<line x1="${dx(inWin)}" y1="${DT}" x2="${dx(inWin)}" y2="${DH-DB}" stroke="var(--warn)" stroke-width="1.6" stroke-dasharray="3 2"/>`;
  s+=`<line x1="${dx(pr.keep)}" y1="${DT}" x2="${dx(pr.keep)}" y2="${DH-DB}" stroke="var(--pos)" stroke-width="1.2" stroke-dasharray="2 3" opacity=".7"/>`;
  s+=`<path d="${linePath(pr.raw)}" fill="none" stroke="var(--gray)" stroke-width="2"/>`;
  s+=`<path d="${linePath(pr.def)}" fill="none" stroke="var(--pos)" stroke-width="2"/>`;
  s+=`<path d="${linePath(pr.hlg)}" fill="none" stroke="var(--accent)" stroke-width="2"/>`;
  s+=`</svg>`; document.getElementById("dist").innerHTML=s;
}

function cfgJSON(){ return JSON.stringify({window:P.window,A:P.A,sM:P.sM,targetGap:P.targetGap,refGap:P.refGap,lw:Math.round(P.lw),xM:P.xM,yM:P.yM,xFloor:P.xFloor,yFloor:P.yFloor,p:P.p}); }
function render(){
  for(const sl of ALL){ const el=document.getElementById("v_"+sl.k); if(!el)continue;
    el.textContent = sl.k==="lw"?Math.round(P.lw).toLocaleString():(Number.isInteger(P[sl.k])?P[sl.k]:P[sl.k].toFixed(2)); }
  const g=geom(); drawCurve(g);
  const ro=[["γ",g.gamma.toFixed(2)],["out_scale",g.outScale.toFixed(1)],["tokens in W",D?probsAt(g).inWin:"—"],["x_ref",g.xRef.toFixed(2)]];
  let pr=null; if(D){ pr=probsAt(g); drawDist(pr);
    const dr=[["HLG top-1",(pr.hlg[0]*100).toFixed(1)+"%"],["raw top-1",(pr.raw[0]*100).toFixed(1)+"%"],["default keeps",pr.keep],["W reaches rank",pr.inWin]];
    document.getElementById("distro").innerHTML=dr.map(([k,v])=>`<div class="ro"><div class="k">${k}</div><div class="val">${v}</div></div>`).join("");
  }
  // curve readouts (recompute inWin cheaply)
  const ro2=[["γ",g.gamma.toFixed(2)],["out_scale",g.outScale.toFixed(1)],["tokens in W",pr?pr.inWin:"—"],["dist",D?`${D.tag} (${D.ent}b)`:"—"]];
  document.getElementById("readouts").innerHTML=ro2.map(([k,v])=>`<div class="ro"><div class="k">${k}</div><div class="val" style="font-size:${String(v).length>8?11:14}px">${v}</div></div>`).join("");
  document.getElementById("cfgField").value=cfgJSON();
}
function applyPreset(n){ Object.assign(P,PRESETS[n]); for(const sl of ALL){ const inp=document.getElementById("s_"+sl.k); if(inp) inp.value=sl.log?lwToS(P[sl.k]):P[sl.k]; } render(); }
function copyValues(){ const txt=cfgJSON(), ok=document.getElementById("copyOk"); const done=()=>{ok.textContent="Copied!";setTimeout(()=>ok.textContent="",1600);};
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done,()=>{fb(txt);done();}); else {fb(txt);done();} }
function fb(t){ const f=document.getElementById("cfgField"); f.focus(); f.select(); try{document.execCommand("copy");}catch(e){} }

buildGrid(); buildDistSel(); prep();
document.querySelectorAll(".presets button[data-preset]").forEach(b=>b.addEventListener("click",()=>applyPreset(b.dataset.preset)));
document.getElementById("copyBtn").addEventListener("click",copyValues);
document.getElementById("cfgField").addEventListener("click",e=>e.target.select());
render();
</script>
</body></html>
