<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mlx-bun · chat</title>
<style>
  :root{
    --bg:#000; --ink:#f5f5f7; --dim:#86868b; --dimmer:#515154;
    --hairline:rgba(255,255,255,.14); --card:rgba(255,255,255,.045);
    --blue:#0a84ff; --cyan:#64d2ff; --purple:#bf5af2; --pink:#ff375f;
    --orange:#ff9f0a; --green:#30d158; --red:#ff453a;
    --ease:cubic-bezier(.22,.61,.21,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);
    font:16px/1.6 -apple-system,"SF Pro Text",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
  ::selection{background:rgba(10,132,255,.4)}
  .grad{background-clip:text;-webkit-background-clip:text;color:transparent;
    background-image:linear-gradient(96deg,var(--orange),var(--pink) 35%,var(--purple) 65%,var(--blue))}

  header{display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:14px 22px;border-bottom:1px solid var(--hairline);flex:0 0 auto}
  header .brand{font-size:18px;font-weight:700;letter-spacing:-.02em;text-decoration:none}
  header .model{font:12.5px ui-monospace,"SF Mono",Menlo,monospace;color:var(--dim);
    background:var(--card);border:1px solid var(--hairline);border-radius:8px;padding:4px 10px;
    max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  header a.status{font-size:13px;color:var(--dim);text-decoration:none}
  header a.status:hover{color:var(--ink)}

  #scroll{flex:1;overflow-y:auto}
  #thread{max-width:820px;margin:0 auto;padding:28px 22px 12px;display:flex;flex-direction:column;gap:18px}
  .msg{display:flex;flex-direction:column;gap:6px;max-width:88%}
  .msg .who{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--dimmer)}
  .msg .bubble{border-radius:16px;padding:12px 16px;white-space:pre-wrap;word-break:break-word;line-height:1.55}
  .msg.user{align-self:flex-end;align-items:flex-end}
  .msg.user .bubble{background:linear-gradient(120deg,rgba(10,132,255,.28),rgba(94,92,230,.28));
    border:1px solid rgba(10,132,255,.35)}
  .msg.assistant{align-self:flex-start}
  .msg.assistant .bubble{background:var(--card);border:1px solid var(--hairline)}
  .msg .meta{font-size:11.5px;color:var(--dimmer);font-variant-numeric:tabular-nums}
  .msg .meta b{color:var(--green);font-weight:600}
  .cursor{display:inline-block;width:8px;height:17px;vertical-align:-3px;border-radius:2px;
    background:linear-gradient(180deg,var(--pink),var(--purple));animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}

  #hello{max-width:820px;margin:8vh auto 0;padding:0 22px;text-align:center}
  #hello h1{font-size:clamp(34px,5vw,52px);font-weight:700;letter-spacing:-.03em;line-height:1.1}
  #hello p{margin-top:12px;color:var(--dim);font-size:15px}
  #hello .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:26px}
  #hello .chip{border:1px solid var(--hairline);background:var(--card);color:var(--dim);
    border-radius:999px;padding:9px 16px;font-size:13.5px;cursor:pointer;transition:all .25s var(--ease)}
  #hello .chip:hover{color:var(--ink);border-color:rgba(255,255,255,.3)}

  footer{flex:0 0 auto;border-top:1px solid var(--hairline);padding:14px 22px 18px}
  .inputrow{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  #box{flex:1;background:var(--card);border:1px solid var(--hairline);border-radius:16px;
    color:var(--ink);font:inherit;padding:13px 16px;resize:none;outline:none;
    max-height:180px;min-height:50px;transition:border-color .25s}
  #box:focus{border-color:rgba(10,132,255,.5)}
  button{font:600 14px/1 -apple-system,system-ui,sans-serif;border:none;border-radius:14px;
    padding:0 20px;height:50px;cursor:pointer;transition:filter .2s}
  #send{background:linear-gradient(120deg,var(--blue),var(--purple));color:#fff}
  #send:hover{filter:brightness(1.15)}
  #send:disabled{filter:grayscale(.8) brightness(.6);cursor:default}
  #stop{background:var(--card);border:1px solid var(--hairline);color:var(--ink);display:none}
  .hint{max-width:820px;margin:8px auto 0;font-size:11.5px;color:var(--dimmer);
    display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .hint textarea{background:none;border:none;border-bottom:1px solid var(--hairline);color:var(--dim);
    font:inherit;outline:none;width:46%;resize:vertical;min-height:20px;max-height:160px;
    line-height:1.5;padding:0 0 2px;overflow-y:auto}
</style>
</head>
<body>
  <header>
    <a class="brand grad" href="/">mlx-bun</a>
    <span class="model" id="model">connecting…</span>
    <a class="status" href="/">status →</a>
  </header>

  <div id="scroll">
    <div id="hello">
      <h1>Local. Private. <span class="grad">Yours.</span></h1>
      <p>Every token below is generated on this machine. Nothing leaves it.</p>
      <div class="chips">
        <button class="chip" data-q="Explain what makes Apple silicon good at running language models.">Why is Apple silicon good at this?</button>
        <button class="chip" data-q="Write a haiku about running AI models locally.">A haiku about local AI</button>
        <button class="chip" data-q="Give me three weekend project ideas that use a local LLM.">Weekend project ideas</button>
      </div>
    </div>
    <div id="thread"></div>
  </div>

  <footer>
    <div class="inputrow">
      <textarea id="box" rows="1" placeholder="Message the local model…"></textarea>
      <button id="stop">Stop</button>
      <button id="send">Send</button>
    </div>
    <div class="hint">
      <span>Enter to send · Shift+Enter for a new line</span>
      <textarea id="system" rows="1" placeholder="optional system prompt…"></textarea>
    </div>
  </footer>

<script>
  const $ = (id) => document.getElementById(id);
  const thread = $("thread"), scroll = $("scroll"), box = $("box");
  const history = [];
  let aborter = null;

  fetch("/v1/models").then((r) => r.json())
    .then((m) => { $("model").textContent = m.data?.[0]?.id ?? "no model"; })
    .catch(() => { $("model").textContent = "server unreachable"; });

  function el(tag, cls, parent) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    parent?.appendChild(e);
    return e;
  }
  function addMsg(role) {
    const m = el("div", "msg " + role, thread);
    el("div", "who", m).textContent = role === "user" ? "you" : "local model";
    const b = el("div", "bubble", m);
    return { m, b };
  }
  const atBottom = () => scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 80;
  const stick = () => { scroll.scrollTop = scroll.scrollHeight; };

  async function send(text) {
    if (!text.trim() || aborter) return;
    $("hello").style.display = "none";
    history.push({ role: "user", content: text });
    addMsg("user").b.textContent = text;
    box.value = ""; box.style.height = "auto";
    const { m, b } = addMsg("assistant");
    const cursor = el("span", "cursor", b);
    const meta = el("div", "meta", m);
    stick();

    aborter = new AbortController();
    $("send").disabled = true; $("stop").style.display = "block";
    const t0 = performance.now();
    let tFirst = 0, tokens = 0, content = "";
    try {
      const sys = $("system").value.trim();
      const res = await fetch("/v1/chat/completions", {
        method: "POST",
        headers: { "content-type": "application/json" },
        signal: aborter.signal,
        body: JSON.stringify({
          stream: true,
          messages: [...(sys ? [{ role: "system", content: sys }] : []), ...history],
        }),
      });
      if (!res.ok) throw new Error((await res.text()).slice(0, 300));
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split("\n");
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6);
          if (data === "[DONE]") continue;
          const payload = JSON.parse(data);
          if (payload.error?.message) throw new Error(payload.error.message);
          const delta = payload.choices?.[0]?.delta?.content;
          if (delta) {
            if (!tFirst) tFirst = performance.now();
            tokens++;
            content += delta;
            cursor.before(document.createTextNode(delta));
            if (atBottom()) stick();
          }
        }
      }
    } catch (e) {
      if (e.name !== "AbortError") {
        content += content ? "" : "";
        const err = el("div", "meta", m);
        err.textContent = "error: " + e.message;
        err.style.color = "var(--red)";
      }
    } finally {
      cursor.remove();
      const secs = (performance.now() - (tFirst || t0)) / 1000;
      if (tokens > 1 && secs > 0)
        meta.innerHTML = "<b>" + (tokens / secs).toFixed(1) + " tok/s</b> · " +
          tokens + " tokens · first token " + Math.round((tFirst - t0)) + "ms";
      if (content) history.push({ role: "assistant", content });
      aborter = null;
      $("send").disabled = false; $("stop").style.display = "none";
      box.focus();
    }
  }

  $("send").onclick = () => send(box.value);
  $("stop").onclick = () => aborter?.abort();
  box.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(box.value); }
  });
  box.addEventListener("input", () => {
    box.style.height = "auto";
    box.style.height = Math.min(box.scrollHeight, 180) + "px";
  });
  document.querySelectorAll(".chip").forEach((c) =>
    c.addEventListener("click", () => send(c.dataset.q)));
  box.focus();
</script>
</body>
</html>
